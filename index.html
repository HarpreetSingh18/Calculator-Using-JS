<html>
    <head>
    <title> Calcualor</title>
    <link rel="stylesheet" href="css/styles.css" >
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    </head>   

    <body style="background:lightskyblue;">
     <div class="layout">
        <h3>JS Calcualor</h3>
        <hr>
        <p id="resultdisplay">Hello </p>
        <br>
        <div class="keypad">
        <div class="row">
                <button class="button btn btn-lg btn-dark">C</button>
                <button class="button btn btn-lg btn-dark">%</button>
                <button class="button btn btn-lg btn-dark"> <- </button>
                <button class="button btn btn-lg btn-dark"> / </button>
        </div>
        <br>
        <div class="row">

        <button onclick="resultExpression(1)" class="button btn btn-lg btn-dark">1</button>
        <button class="button btn btn-lg btn-dark">2</button>
        <button class="button btn btn-lg btn-dark">3</button>
        <button class="button btn btn-lg btn-dark">x</button>
        </div>
        <br>
        <div class="row">
        <button class="button btn btn-lg btn-dark">4</button>
        <button class="button btn btn-lg btn-dark">5</button>

        <button class="button btn btn-lg btn-dark">6</button>
        <button class="button btn btn-lg btn-dark">-</button>
        </div>
       <br>
        <div class="row">
        <button class="button btn btn-lg btn-dark">7</button>
        <button class="button btn btn-lg btn-dark">8</button>
        <button class="button btn btn-lg btn-dark">9</button>
        <button class="button btn btn-lg btn-dark">+</button>
        </div>
        <br>

        <div class="row">
            <button class="button btn btn-lg btn-dark">00</button>
            <button class="button btn btn-lg btn-dark">0</button>
            <button class="button btn btn-lg btn-dark">.</button>
            <button class="button btn btn-lg btn-dark">=</button>
            </div>
            <br>
     </div>
    </div>
    <script src="JS/index.js"></script>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
<script type="text/javascript" src="JS/index.js"></script>
    </body>
</html>
